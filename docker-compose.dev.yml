# Development Docker Compose - with hot reload and debugging
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-highlighter-backend-dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - FLASK_APP=app.py
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8081,http://localhost:8082,http://frontend:8082
      - MAX_FILE_SIZE_MB=50
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./backend:/app
      - uploads_volume:/app/uploads
    restart: unless-stopped
    command: python -m flask run --host=0.0.0.0
    networks:
      - pdf-highlighter-network

  # Frontend - optional, can run locally instead
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #   container_name: pdf-highlighter-frontend-dev
  #   ports:
  #     - "8082:8082"
  #   volumes:
  #     - ./src:/app/src
  #     - ./app.json:/app/app.json
  #     - /app/node_modules
  #   depends_on:
  #     - backend
  #   networks:
  #     - pdf-highlighter-network

volumes:
  uploads_volume:
    driver: local

networks:
  pdf-highlighter-network:
    driver: bridge
