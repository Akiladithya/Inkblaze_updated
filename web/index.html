<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#F9F7F4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>INNK — Document Intelligence</title>
    <meta name="description" content="Surface what matters. Upload a document and receive the most important passages highlighted, with AI-generated questions." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #F9F7F4;
        --ink:     #1A1814;
        --primary: #2D5016;
        --gold:    #B8860B;
        --muted:   #9C9690;
        --border:  #E2DDD6;
      }

      html {
        height: 100%;
        scroll-behavior: smooth;
        scrollbar-width: thin;
        scrollbar-color: #C8C2B8 #F2EFE9;
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #F2EFE9; }
      ::-webkit-scrollbar-thumb { background: #C8C2B8; border-radius: 3px; }

      body {
        height: 100%;
        background: var(--bg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      #root { height: 100%; position: relative; z-index: 1; }

      /* Very subtle warm grain texture via SVG */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.018;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
      }

      /* Splash */
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #F9F7F4;
        z-index: 9999; gap: 24px;
        transition: opacity 0.5s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }

      #splash-wordmark {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 42px;
        font-weight: 600;
        color: #1A1814;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      #splash-rule {
        width: 40px; height: 1px;
        background: #B8860B;
      }

      #splash-ring {
        width: 28px; height: 28px;
        border: 1.5px solid #E2DDD6;
        border-top-color: #2D5016;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      #splash-text {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: #9C9690;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 768px) {
        button, [role="button"] { min-height: 44px; }
      }

      @supports (-webkit-touch-callout: none) {
        #root { padding-bottom: env(safe-area-inset-bottom); }
      }

      ::selection      { background: rgba(184,134,11,0.15); color: #1A1814; }
      ::-moz-selection { background: rgba(184,134,11,0.15); color: #1A1814; }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-wordmark">INNK</div>
      <div id="splash-rule"></div>
      <div id="splash-ring"></div>
      <div id="splash-text">Preparing workspace</div>
    </div>

    <div id="root"></div>

    <script>
      (function () {
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var splash = document.getElementById('splash');
            if (splash) {
              splash.classList.add('hidden');
              setTimeout(function () {
                if (splash.parentNode) splash.parentNode.removeChild(splash);
              }, 600);
            }
            observer.disconnect();
          }
        });
        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
