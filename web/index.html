<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>PDF Highlighter</title>
    <meta name="description" content="Smart document highlighter — TF-IDF scoring, AI MCQs, PDF export" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <style>
      /* Prevent FOUC on web */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #F7F9FC;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      /* Loading spinner shown before JS hydrates */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F7F9FC;
        z-index: 9999;
        gap: 16px;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-ring {
        width: 52px;
        height: 52px;
        border: 4px solid #DDE5F0;
        border-top-color: #F59E0B;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      #splash-text {
        font-size: 15px;
        color: #4B5E7A;
        font-weight: 500;
        letter-spacing: 0.3px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash shown while React Native Web boots -->
    <div id="splash">
      <div id="splash-ring"></div>
      <div id="splash-text">Loading PDF Highlighter…</div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash once React mounts
      document.addEventListener('DOMContentLoaded', function () {
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var splash = document.getElementById('splash');
            if (splash) {
              splash.classList.add('hidden');
              setTimeout(function () { splash.remove(); }, 500);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
